name: Deploy Backend

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to VPS/EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ${{ secrets.VPS_PROJECT_PATH }}
            git pull origin main
            corepack enable
            pnpm install --frozen-lockfile
            pnpm build
            pm2 restart ${{ secrets.PM2_APP_NAME }} --update-env || pm2 start dist/server.js --name ${{ secrets.PM2_APP_NAME }}
            pm2 save
